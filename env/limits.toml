# SPEC 080 BG-2 — budget-guard limits. FROZEN after M0 (CON-7).
# All limits the guard enforces live here, never inline in code.

[embodiment.franka]
# arm dofs before the finger dofs in the command vector
n_arm_dof = 7
# official Panda joint position limits (rad), arm 7 dof + 2 finger dofs (m)
q_min = [-2.8973, -1.7628, -2.8973, -3.0718, -2.8973, -0.0175, -2.8973, 0.0, 0.0]
q_max = [2.8973, 1.7628, 2.8973, -0.0698, 2.8973, 3.7525, 2.8973, 0.04, 0.04]
# official Panda joint velocity limits (rad/s); fingers 0.05 m/s
qdot_max = [2.175, 2.175, 2.175, 2.175, 2.61, 2.61, 2.61, 0.05, 0.05]
# velocity is judged against the last SAFE command + the contract dt of the
# joint_cmd topic (TC-4: 100 Hz)
cmd_dt_s = 0.01
# EE workspace AABB (m, base frame): keeps the flange out of the floor and
# inside the pharmacy work envelope (reach 0.855 m)
workspace_min = [-0.20, -0.75, 0.01]
workspace_max = [0.90, 0.75, 1.20]
# reference pose: velocity/workspace clamping for the FIRST command is
# judged against this (the robot starts at home); also the hold target if
# a command cannot be made legal. MUST equal home_qpos in
# src/aisle/scenes/physics.toml (asserted by unit test)
fallback_qpos = [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785, 0.04, 0.04]
# gripper_cmd scalar range (0 open .. 1 closed)
gripper_min = 0.0
gripper_max = 1.0
# max normalized rate: each Panda finger moves 0.05 m/s over ITS 0.04 m
# travel (the 0.08 m figure is the two-finger WIDTH, not one finger's
# travel) — matches the finger qdot_max, so the joint and gripper
# channels enforce the same physical rate
gripper_rate_max = 1.25
# contract dt of the gripper_cmd topic (TC: 30 Hz)
gripper_dt_s = 0.0333

[episode]
# wall-clock BACKSTOP per episode against hung/runaway pipelines; on
# breach the guard holds the robot at the last safe command (clamp, never
# drop) and publishes wall_timeout until the next reset_done — the ONLY
# event that restarts the timer (idle pauses must not stretch it). The
# EPISODE timeout is the verifier's, in SIM time; sim can run slower than
# wall (T08 live: ~0.5x with rendering; the T15 STORE runs ~0.1x with 23
# entities), so this backstop must comfortably exceed the episode budget
# in wall terms for the SLOWEST scene: the 600 s-sim retail episode needs
# ~15 wall-minutes. 300 s froze the base AND arm mid-episode at exactly
# t+300 (T15 rounds 4-6) while the graph was healthy.
wall_timeout_s = 1800.0

# SPEC 210 MOB-3 — mobile base limits (extends SPEC 080). Class C.
[embodiment.mobile]
# differential-drive base command limits
v_max = 0.8
omega_max = 1.5
# creep speed the base is clamped to whenever the arm is in motion — arm
# motion and base motion above creep MUST NOT be commanded together (MOB-3)
v_creep = 0.05
omega_creep = 0.1
# contract dt of the base_cmd topic (MOB-1: <=50 Hz)
base_cmd_dt_s = 0.02
# keep-out: min base-to-shelf distance (m) required while the arm is
# extended beyond the base footprint (MOB-3 keep-out zones)
min_shelf_dist_m = 0.35
# mutex hold: a commanded arm-target change keeps the base clamped to creep
# for this long; refreshed by each change, expires on command silence so a
# settled arm releases the base and a still-travelling arm keeps it held
# (MOB-3; must exceed a single arm move's travel time)
arm_motion_hold_s = 1.0
# the arm is "reaching" (keep-out active) when the flange extends past this
# horizontal reach from the base origin; the home/ready pose (~0.31 m) is NOT
# reaching, so the base may still approach a shelf to set up before the arm
# extends to manipulate (MOB-3, CON-15 ADR-14)
arm_extended_reach_m = 0.40
# base watchdog: a base_cmd whose accepting tick is older than this is stale;
# the guard emits a stop [0,0] so a latched command cannot integrate forever
# after the producer dies or the episode times out (MOB-3/BG-2)
# 0.5: under sim backpressure (store rtf ~0.1) dora timers stretch and
# a 0.1 s staleness zeroed the base between every nav command (T15 live
# round 2); 0.5 still stops a dead producer within half a second
base_staleness_s = 0.5
# nav action lifecycle (MOB-2): arrival tolerances (position m, yaw rad) and
# the timeout / stall tick budgets before a nav fails timeout / blocked
# 0.05: the pick IK chain must solve at the WORST arrival corner — the
# planning envelope test sweeps exactly these tolerances (T15)
nav_arrival_tol_m = 0.05
nav_arrival_yaw_rad = 0.05
# rotate-phase omega cap: saturated rotation (1.5 rad/s) with the
# pipeline's ~0.15 s-sim loop delay overshoots the 0.05 yaw band every
# swing and limit-cycles (T15 round 8 tap); 0.3 keeps the worst
# overshoot (~0.045) inside the band
nav_rotate_omega_max = 0.3
nav_timeout_ticks = 3000
nav_stall_ticks = 200
