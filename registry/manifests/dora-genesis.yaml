# The EXECUTABLE sim bridge: one process serving the camera-source /
# arm-driver-sim / gripper-driver-sim facets (those manifests remain the
# abstract capability exemplars; this id is what runnable graphs wire).
id: dora-genesis
kind: node
provides: [sim_bridge, rgb_stream, depth_stream, arm_actuation, gripper_actuation]
requires: []
inputs:
  tick: {schema: timer_tick, rate_hz: 100}
  joint_cmd: {schema: jointvec_f32, rate_hz: 100}
  gripper_cmd: {schema: scalar_f32, rate_hz: 30}
  # SPEC 210 MOB-1 (mobile only): diff-drive command [v, omega]
  base_cmd: {schema: base_cmd2d_f32, rate_hz: 50}
  reset: {schema: reset_request_u32, rate_hz: 1}
outputs:
  bridge_info: {schema: json_utf8, latency_class: best_effort}
  joint_state: {schema: jointvec_f32, latency_class: hard_rt}
  gripper_state: {schema: scalar_f32, latency_class: hard_rt}
  # privileged sim ground truth; consumable only by verifier-* nodes (VAL-6)
  oracle_state: {schema: posearray7d_f32, latency_class: soft_rt}
  # NON-privileged tier-T0 perception poses (SPEC 010, issue #2 resolution)
  poses: {schema: posearray7d_f32, latency_class: soft_rt}
  rgb_overhead: {schema: rgb8_image, latency_class: soft_rt}
  rgb_wrist: {schema: rgb8_image, latency_class: soft_rt}
  depth_overhead: {schema: depth_f32, latency_class: soft_rt}
  reset_done: {schema: reset_done_u32, latency_class: best_effort}
  # SPEC 210 (mobile only): kinematic base topics + store-frame announce
  base_pose: {schema: base_pose3d_f32, latency_class: hard_rt}
  base_scan: {schema: base_scan_f32, latency_class: soft_rt}
  frame_info: {schema: json_utf8, latency_class: best_effort}
embodiment:
  arm: [franka, so101]
  gripper: any
safety_class: motion
eval:
  suite: tests/accept/test_contract.py (TC-A1..A3)
  pass_rate: 1.0
  last_run: "2026-07-20"
origin: hub
source: src/aisle/nodes/dora_genesis.py
