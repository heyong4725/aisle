id: task-state-machine
kind: node
provides: [task_sequencing]
requires: [episode_verification]
inputs:
  episode_goal: {schema: json_utf8, rate_hz: 1}
  episode_result: {schema: json_utf8, rate_hz: 1}
  violation: {schema: json_utf8, rate_hz: 1}
outputs:
  target_request: {schema: json_utf8, latency_class: best_effort}
  episode_feedback: {schema: json_utf8, latency_class: best_effort}
params:
  max_retries: {type: int, default: 8, range: [0, 8]}
embodiment:
  arm: [franka, so101]
  gripper: any
safety_class: decision
eval: null
origin: hub
source: src/aisle/nodes/task_state_machine.py
