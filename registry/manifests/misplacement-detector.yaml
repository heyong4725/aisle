# design doc §11.4 / SPEC 200 RS-10 (ADR-17): ORACLE rung — detected
# identity vs planogram, same occupancy geometry as the verifier.
id: misplacement-detector
kind: node
provides: [misplacement_detection]
requires: []
inputs:
  # NON-privileged tier-T0 perception poses (SPEC 010): identical
  # layout/ordering contract to oracle_state, VAL-6-clean
  poses: {schema: posearray7d_f32, rate_hz: 15}
  episode_goal: {schema: json_utf8, rate_hz: 1}
outputs:
  misplacement_report: {schema: json_utf8, latency_class: best_effort}
embodiment:
  arm: [franka]
  gripper: any
  base: [mobile]
safety_class: perception
eval: null
origin: hub
source: src/aisle/nodes/misplacement_detector.py
