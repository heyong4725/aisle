# CAP-2: closed schema vocabulary — name -> Arrow type + shape.
# Every `schema` value in a capability manifest MUST be a key in this file.
# Adding a schema name is a Class C change (CAP-2).
# Shapes reference SPEC 010 §2 dimension symbols (h, w, n_dof, n_obj).

[rgb8_image]
arrow = "UInt8"
shape = "h*w*3"

[depth_f32]
arrow = "Float32"
shape = "h*w"

[jointvec_f32]
arrow = "Float32"
shape = "n_dof"

[scalar_f32]
arrow = "Float32"
shape = "1"

[pose7d_f32]
arrow = "Float32"
shape = "7"

[posearray7d_f32]
arrow = "Float32"
shape = "n_obj*7"

[json_utf8]
arrow = "Utf8"
shape = "1"

[reset_request_u32]
arrow = "UInt32"
shape = "2"

[reset_done_u32]
arrow = "UInt32"
shape = "1"
