id: ik-trajectory
kind: node
provides: [trajectory_generation]
requires: [grasp_planning]
inputs:
  grasp_pose: {schema: pose7d_f32, rate_hz: 30}
  joint_state: {schema: jointvec_f32, rate_hz: 100}
  # episode boundary: aborts any active plan (T08; stale plans froze the
  # guard in the first live run)
  reset_done: {schema: reset_done_u32, rate_hz: 1}
outputs:
  joint_cmd: {schema: jointvec_f32, latency_class: soft_rt}
  gripper_cmd: {schema: scalar_f32, latency_class: soft_rt}
params:
  max_joint_vel_rad_s: {type: float, default: 1.0, range: [0.1, 2.0]}
embodiment:
  arm: [franka, so101]
  gripper: parallel
safety_class: decision
eval: null
origin: hub
source: src/aisle/nodes/ik_trajectory.py
