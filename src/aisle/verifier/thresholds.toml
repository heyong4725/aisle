# VER-2: ALL verifier thresholds live here, never inline.

[success]
upright_max_deg = 30.0
# target box AABB must sit inside the tray volume grown by this margin
tray_margin_m = 0.005
# success requires the box RESTING on the tray floor: its AABB bottom may
# be at most this far above it (an airborne box passing over the tray is
# never success)
resting_tolerance_m = 0.01
robot_home_tolerance_rad = 0.15

[failure]
# below this center height a box can only be resting on the floor: floor-
# resting centers span 0.015-0.055 m while tray/shelf resting centers start
# at ~0.08 m, so 0.07 cleanly separates them (review: 0.015 was unreachable)
dropped_z_m = 0.07
# wrong_object entry: footprint containment counts only from the tray floor
# up to this height (shelf boxes above the footprint have not "entered")
wrong_object_entry_height_m = 0.15
# a box whose center moved beyond this without reaching the tray was struck
move_epsilon_m = 0.01
knock_epsilon_m = 0.03
