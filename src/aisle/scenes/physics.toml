# SCN-2: all physics and layout constants for the pharmacy scene.
# NO physics constants inline in code.

[sim]
dt = 0.01
# one substep: rigid box pick-place is stable at dt=0.01, and the 100 Hz
# bridge tick budget (BRG-1/BRG-2) needs the ~2x step-cost headroom
substeps = 1
gravity = [0.0, 0.0, -9.81]

[materials.box]
friction = 0.80
density_kg_m3 = 250.0

[materials.shelf]
friction = 0.60

[materials.tray]
friction = 0.70

# shared shelf/tray geometry; positions and scale are per-embodiment
# (M0-5: an embodiment is a scene+driver PROFILE swap)
[shelf]
board_thickness = 0.02
min_separation = 0.02
edge_margin = 0.03

[tray]
wall_thickness = 0.01

[embodiment.franka]
reach_m = 0.855
shelf_pos = [0.50, 0.0, 0.0]
# STAGGERED two-level shelf (M0 env-change, owner-approved): the old
# three-level stack physically blocked top-down grasps on lower levels
# (any vertical descent crosses the full-depth board above; ADR-10
# section 8). The upper board is SET BACK (display-shelf style) so the
# lower level's front band has open sky — the PROVEN top-down strategy
# works on every level. level_depths are rear-aligned within the shelf
# footprint.
shelf_level_heights = [0.05, 0.32]
# L0's open band additionally reserves HAND_CLEARANCE_M from the upper
# board's front plane (the hand landed on the board edge in the T10
# physics replay); 0.36 - 0.12 - 0.10 leaves a 0.14 m band
shelf_level_depths = [0.36, 0.12]
shelf_level_size = [0.36, 0.60]
tray_pos = [0.35, -0.35, 0.02]
tray_size = [0.20, 0.28, 0.04]
# elbow-bent ready pose: the deterministic IK start (all-zeros is singular)
home_qpos = [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785, 0.04, 0.04]
# finger-dof PD gains: the MJCF tendon-approximated finger actuator is
# inert under genesis position control with default gains — the fingers
# fall closed and NEVER physically grip (latent since T04, exposed by the
# T08 grasp work; per-gripper-dof, cf. gripper_dofs)
# high kp => firm pinch: at contact the squeeze force is kp * penetration
# command; 500 held ~9 N and boxes PITCHED ~50 deg inside the grip during
# the carry (T08 replays), landing on their edges
gripper_kp = [2000.0, 2000.0]
gripper_kv = [100.0, 100.0]
gripper_dofs = 2
gripper_open_m = 0.04
gripper_close_m = 0.0

[embodiment.so101]
reach_m = 0.450
shelf_pos = [0.22, 0.0, 0.0]
# smaller arm, smaller approach clearance (overrides [ik].pregrasp_height_m)
pregrasp_height_m = 0.06
# TC-5: so101 is 6 arm dofs + 1 gripper dof
gripper_dofs = 1
# staggered two-level shelf scaled to the 0.45 m arm: the upper level is
# geometry-only (the reach pre-filter excludes it, hand clearance leaves
# no usable band); all five meds place on L0's 0.14 m open band across
# the widened 0.50 m span — verified over 200 placement seeds
shelf_level_heights = [0.02, 0.24]
shelf_level_depths = [0.30, 0.06]
shelf_level_size = [0.30, 0.50]
tray_pos = [0.16, -0.16, 0.01]
tray_size = [0.14, 0.18, 0.03]

[ik]
pregrasp_height_m = 0.10
pos_tol_m = 0.015
rot_tol_rad = 0.15
max_starts = 4
max_solver_iters = 100
init_perturbation_rad = 0.3
# sampler-side geometric pre-filter: candidate pre-grasp targets must lie
# within this fraction of the arm's reach (rejects corner placements the
# IK backstop would otherwise abort the build on)
reach_margin_frac = 0.92

[cameras]
overhead_pos = [0.55, 0.0, 1.20]
overhead_lookat = [0.55, 0.0, 0.20]
wrist_offset_m = [0.0, 0.0, 0.05]

[domain_randomization]
ambient_default = 0.5
ambient_min = 0.3
ambient_range = 0.5
texture_scale_min = 0.8
texture_scale_range = 0.4
friction_jitter_frac = 0.2
camera_jitter_m = 0.04
