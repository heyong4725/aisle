# SPEC 210 MOB-2: named navigation targets in the store frame (MOB-5).
# Each is [x, y, yaw] (metres, radians). Poses are resolved by the nav
# action; unknown names are a loud error, never a silent default.
# Aligned with the T12 store geometry (planogram.toml, ADR-15): counter
# and bin stand in the open area at x<0; the zone poses face their rows.
[locations]
counter = [-0.5, 0.0, 3.14159]
bin = [-0.5, 1.2, 3.14159]
shelf_zone_A = [1.5, 1.0, 1.5708]
shelf_zone_B = [1.5, -1.0, -1.5708]
