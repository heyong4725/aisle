name: nightly
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
jobs:
  sim-graph-accept:
    name: nightly/sim-graph-accept
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra sim
      - run: uv tool install dora-rs-cli==0.5.0
      - run: uv run pytest -m "sim or graph or accept" -q
